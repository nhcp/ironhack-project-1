---
- name: Install and configure Docker on all instances
  hosts: all
  become: true

  tasks:
    - name: Update apt package index
      ansible.builtin.apt:
        update_cache: true

    - name: Install Docker
      ansible.builtin.package:
        name: docker.io
        state: present

    - name: Ensure Docker service is running and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true
